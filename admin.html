<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxDrive – Gallery Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4AF37;
            --gold-light: #F5D061;
            --bg: #030714;
            --surface: #0a0b18;
            --surface2: #111225;
            --border: rgba(212, 175, 55, 0.2);
            --text: #e2e8f0;
            --muted: #64748b;
            --red: #ef4444;
            --red-hover: #dc2626;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* ── TOPBAR ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 40px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-logo img {
            height: 42px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .topbar-badge {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--border);
            padding: 5px 14px;
            border-radius: 50px;
        }

        .logout-btn {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--muted);
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 7px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* ── LOGIN PAGE ── */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 50% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 60%);
        }

        .login-card {
            width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.08);
        }

        .login-card h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card p {
            color: var(--muted);
            font-size: 0.88rem;
            margin-bottom: 32px;
        }

        .form-field {
            margin-bottom: 18px;
        }

        .form-field label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-field input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 13px 16px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-field input:focus {
            border-color: var(--gold);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.2s;
        }

        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .error-msg {
            color: #f87171;
            font-size: 0.82rem;
            margin-top: 12px;
            display: none;
            text-align: center;
        }

        /* ── ADMIN LAYOUT ── */
        .admin-page {
            display: none;
        }

        .admin-body {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 30px;
        }

        /* ── STATS BAR ── */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 36px;
        }

        .stat-card {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 24px;
        }

        .stat-card .stat-num {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--gold);
        }

        .stat-card .stat-label {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 4px;
        }

        /* ── UPLOAD PANEL ── */
        .upload-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 32px;
            margin-bottom: 36px;
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 24px;
        }

        .drop-zone {
            border: 2px dashed rgba(212, 175, 55, 0.35);
            border-radius: 14px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            background: rgba(212, 175, 55, 0.03);
            transition: all 0.25s;
            position: relative;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.08);
        }

        .drop-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .drop-zone h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .drop-zone p {
            font-size: 0.82rem;
            color: var(--muted);
        }

        #file-input {
            display: none;
        }

        /* Preview */
        .preview-area {
            display: none;
            margin-top: 24px;
            padding: 20px;
            background: var(--surface2);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            align-items: center;
            gap: 20px;
        }

        .preview-area.visible {
            display: flex;
        }

        #preview-img {
            width: 120px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .preview-info {
            flex: 1;
        }

        .preview-info p {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .preview-info strong {
            color: #fff;
            font-size: 0.92rem;
        }

        .upload-btn {
            padding: 12px 28px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            color: #000;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s, transform 0.2s;
        }

        .upload-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .cancel-btn {
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: transparent;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cancel-btn:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        /* ── GALLERY GRID ── */
        .gallery-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 32px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .reset-btn {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--muted);
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 7px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .gallery-card {
            background: var(--surface2);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }

        .gallery-card:hover {
            transform: translateY(-3px);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .gallery-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }

        .card-meta {
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .card-date {
            font-size: 0.68rem;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: 0.03em;
        }

        .del-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: none;
            background: rgba(239, 68, 68, 0.1);
            color: var(--red);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .del-btn:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .del-btn svg {
            width: 14px;
            height: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* ── FILTER BAR ── */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .filter-btn {
            padding: 7px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: transparent;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.04em;
        }

        .filter-btn:hover {
            border-color: rgba(212, 175, 55, 0.4);
            color: var(--gold-light);
        }

        .filter-btn.active {
            background: rgba(212, 175, 55, 0.12);
            border-color: var(--gold);
            color: var(--gold);
        }

        .filter-divider {
            width: 1px;
            height: 22px;
            background: rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }

        .filter-date-input {
            padding: 7px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--surface2);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
            color-scheme: dark;
        }

        .filter-date-input:focus {
            border-color: var(--gold);
        }

        .filter-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        .filter-count {
            margin-left: auto;
            font-size: 0.75rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .filter-count span {
            color: var(--gold);
            font-weight: 700;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 22px;
            font-size: 0.88rem;
            font-weight: 500;
            color: #fff;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            pointer-events: none;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.gold {
            border-color: var(--gold);
            color: var(--gold);
        }

        .toast.danger {
            border-color: var(--red);
            color: #f87171;
        }

        @media (max-width: 700px) {
            .topbar {
                padding: 14px 20px;
            }

            .admin-body {
                padding: 24px 16px;
            }

            .stats-bar {
                flex-direction: column;
            }

            .upload-panel,
            .gallery-panel {
                padding: 20px;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }

            .preview-area.visible {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

    <!-- ── LOGIN PAGE ── -->
    <div class="login-page" id="loginPage">
        <div class="login-card">
            <h1>Admin Panel</h1>
            <p>Sign in to manage the gallery</p>
            <div class="form-field">
                <label>Username</label>
                <input type="text" id="username" placeholder="admin" />
            </div>
            <div class="form-field">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••"
                    onkeydown="if(event.key==='Enter')login()" />
            </div>
            <button class="login-btn" onclick="login()">Sign In</button>
            <p class="error-msg" id="errorMsg">⚠ Invalid credentials. Try again.</p>
        </div>
    </div>

    <!-- ── ADMIN PAGE ── -->
    <div class="admin-page" id="adminPage">

        <!-- Topbar -->
        <div class="topbar">
            <a class="topbar-logo" href="index.html">
                <img src="https://res.cloudinary.com/drlg1t6pk/image/upload/v1774865270/logo_ilq8wl.png"
                    alt="LuxDrive Logo" />
            </a>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>

        <div class="admin-body">

            <!-- Stats -->
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-num" id="statTotal">0</div>
                    <div class="stat-label">Total Images</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="statDefault">0</div>
                    <div class="stat-label">Default Images</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="statUploaded">0</div>
                    <div class="stat-label">Uploaded Images</div>
                </div>
            </div>

            <!-- Upload Panel -->
            <div class="upload-panel">
                <div class="panel-title">Upload New Image</div>
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('file-input').click()">
                    <div class="drop-icon">🖼</div>
                    <h3>Drag & drop an image here</h3>
                    <p>or click to browse — JPG, PNG, WEBP supported</p>
                    <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)" />
                </div>

                <div class="preview-area" id="previewArea">
                    <img id="preview-img" src="" alt="Preview" />
                    <div class="preview-info">
                        <strong id="preview-name">filename.jpg</strong>
                        <p id="preview-size">— KB</p>
                    </div>
                    <button class="cancel-btn" onclick="cancelPreview()">Cancel</button>
                    <button class="upload-btn" onclick="uploadImage()">Add to Gallery</button>
                </div>
            </div>

            <!-- Gallery Panel -->
            <div class="gallery-panel">
                <div class="panel-header">
                    <div class="panel-title" style="margin-bottom:0">All Gallery Images</div>
                    <button class="reset-btn" onclick="resetToDefaults()" title="Restore all default images">↺ Reset to
                        Defaults</button>
                </div>

                <!-- Filter Bar -->
                <div class="filter-bar">
                    <button class="filter-btn active" id="filterAll" onclick="setFilter('all')">All</button>
                    <button class="filter-btn" id="filterMonth" onclick="setFilter('month')">This Month</button>
                    <div class="filter-divider"></div>
                    <span class="filter-label">From</span>
                    <input type="date" class="filter-date-input" id="filterFrom" onchange="setFilter('custom')" />
                    <span class="filter-label">To</span>
                    <input type="date" class="filter-date-input" id="filterTo" onchange="setFilter('custom')" />
                    <button class="filter-btn" id="filterCustom" onclick="setFilter('custom')"
                        style="display:none">Apply</button>
                    <button class="filter-btn" onclick="clearDateFilter()" id="clearDateBtn"
                        style="display:none; color:#f87171; border-color:rgba(239,68,68,0.3)">✕ Clear</button>
                    <span class="filter-count" id="filterCount"></span>
                </div>

                <div class="gallery-grid" id="galleryGrid"></div>
            </div>

        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ── DEFAULT GALLERY (mirrors index.html) ──
        const DEFAULT_GALLERY = [
            { id: '1', img: 'car2.png', height: 600, isDefault: true },
            { id: '2', img: 'service_ferrari_red_1774953144261.png', height: 400, isDefault: true },
            { id: '3', img: 'car3.png', height: 800, isDefault: true },
            { id: '4', img: 'service_bugatti_blue_1774953400000_1774953291278.png', height: 500, isDefault: true },
            { id: '5', img: 'hero_car.png', height: 900, isDefault: true },
            { id: '6', img: 'service_merc_black_1774953400000_1774953260285.png', height: 450, isDefault: true },
            { id: '7', img: 'service_koenigsegg_white_1774953200395.png', height: 550, isDefault: true },
            { id: '8', img: 'renovation_car.png', height: 700, isDefault: true },
            { id: '9', img: 'car gold.png', height: 500, isDefault: true }
        ];

        const STORAGE_KEY = 'galleryControlled';

        // ── HELPERS ──
        function getGallery() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || DEFAULT_GALLERY;
        }
        function saveGallery(arr) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
        }
        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 2800);
        }
        function updateStats(gallery) {
            const defaults = gallery.filter(i => i.isDefault).length;
            const uploaded = gallery.filter(i => !i.isDefault).length;
            document.getElementById('statTotal').textContent = gallery.length;
            document.getElementById('statDefault').textContent = defaults;
            document.getElementById('statUploaded').textContent = uploaded;
        }

        // ── AUTH ──
        function login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            if (u === 'admin' && p === 'admin123') {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPage').style.display = 'block';
                // Seed if needed
                if (!localStorage.getItem(STORAGE_KEY)) {
                    saveGallery(DEFAULT_GALLERY);
                }
                renderGallery();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
        function logout() {
            document.getElementById('adminPage').style.display = 'none';
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // ── FILE HANDLING ──
        let currentBase64 = '';
        let currentFile = null;

        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) processFile(file);
        });

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) processFile(file);
        }

        function processFile(file) {
            currentFile = file;
            const reader = new FileReader();
            reader.onload = ev => {
                currentBase64 = ev.target.result;
                document.getElementById('preview-img').src = currentBase64;
                document.getElementById('preview-name').textContent = file.name;
                document.getElementById('preview-size').textContent = (file.size / 1024).toFixed(1) + ' KB';
                document.getElementById('previewArea').classList.add('visible');
            };
            reader.readAsDataURL(file);
        }

        function cancelPreview() {
            currentBase64 = '';
            currentFile = null;
            document.getElementById('previewArea').classList.remove('visible');
            document.getElementById('file-input').value = '';
        }

        function uploadImage() {
            if (!currentBase64) return;
            const gallery = getGallery();
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
            const newItem = {
                id: 'admin_' + Date.now(),
                img: currentBase64,
                height: 550,
                isDefault: false,
                date: dateStr
            };
            gallery.push(newItem);
            saveGallery(gallery);
            cancelPreview();
            renderGallery();
            showToast('✓ Image added to gallery', 'gold');
        }

        // ── DELETE ──
        function deleteImage(id) {
            const gallery = getGallery().filter(i => i.id !== id);
            saveGallery(gallery);
            renderGallery();
            showToast('Image removed from gallery', 'danger');
        }

        // ── RESET ──
        function resetToDefaults() {
            if (!confirm('This will restore all default images. Uploaded images will be kept. Continue?')) return;
            const gallery = getGallery();
            const uploaded = gallery.filter(i => !i.isDefault);
            saveGallery([...DEFAULT_GALLERY, ...uploaded]);
            renderGallery();
            showToast('✓ Default images restored', 'gold');
        }

        // ── FILTER STATE ──
        let currentFilter = 'all';

        function setFilter(type) {
            currentFilter = type;
            // Update button states
            document.getElementById('filterAll').classList.toggle('active', type === 'all');
            document.getElementById('filterMonth').classList.toggle('active', type === 'month');
            if (type === 'custom') {
                document.getElementById('filterAll').classList.remove('active');
                document.getElementById('filterMonth').classList.remove('active');
            }
            // Show/hide clear button
            const hasDateRange = document.getElementById('filterFrom').value || document.getElementById('filterTo').value;
            document.getElementById('clearDateBtn').style.display = hasDateRange ? 'inline-flex' : 'none';
            renderGallery();
        }

        function clearDateFilter() {
            document.getElementById('filterFrom').value = '';
            document.getElementById('filterTo').value = '';
            document.getElementById('clearDateBtn').style.display = 'none';
            setFilter('all');
        }

        function parseItemDate(dateStr) {
            // dateStr format: "08 Apr 2026" (en-IN locale)
            if (!dateStr) return null;
            return new Date(dateStr);
        }

        function applyFilter(gallery) {
            const now = new Date();
            if (currentFilter === 'all') return gallery;

            if (currentFilter === 'month') {
                return gallery.filter(item => {
                    if (!item.date) return false;
                    const d = parseItemDate(item.date);
                    return d && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                });
            }

            if (currentFilter === 'custom') {
                const fromVal = document.getElementById('filterFrom').value;
                const toVal = document.getElementById('filterTo').value;
                const from = fromVal ? new Date(fromVal) : null;
                const to = toVal ? new Date(toVal + 'T23:59:59') : null;
                return gallery.filter(item => {
                    if (!item.date) return false;
                    const d = parseItemDate(item.date);
                    if (!d) return false;
                    if (from && d < from) return false;
                    if (to && d > to) return false;
                    return true;
                });
            }
            return gallery;
        }

        // ── RENDER ──
        function renderGallery() {
            const gallery = getGallery();
            updateStats(gallery);
            const filtered = applyFilter(gallery);

            // Update filter count label
            const countEl = document.getElementById('filterCount');
            if (currentFilter !== 'all') {
                countEl.innerHTML = `Showing <span>${filtered.length}</span> of ${gallery.length}`;
            } else {
                countEl.innerHTML = `<span>${gallery.length}</span> images`;
            }

            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><p>No images match this filter.</p></div>';
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.innerHTML = `
                    <img src="${item.img}" alt="Gallery image" loading="lazy" 
                         onerror="this.style.background='#1a1b2e'; this.style.height='140px';" />
                    <div class="card-meta">
                        <span class="card-date">${item.date ? item.date : '—'}</span>
                        <button class="del-btn" onclick="deleteImage('${item.id}')" title="Remove from gallery">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                            </svg>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>

</html>
